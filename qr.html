<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mObywatel - Weryfikacja</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-black: #000000;
            --bg-dark: #0a0a0c;
            --primary-blue: #0084ff;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --success-green: #30d158;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Nagłówek aplikacji */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background-color: var(--bg-dark);
            border-bottom: 1px solid #1c1c1e;
        }

        .back-btn {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
        }

        /* Ekrany aplikacji */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        /* Kontener Kodu QR z narożnikami */
        .qr-container {
            position: relative;
            width: 260px;
            height: 260px;
            background-color: #ffffff; /* Białe tło dla czytelności kodu QR */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            margin-bottom: 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* Obrazek kodu QR */
        .qr-image-src {
            width: 220px;
            height: 220px;
            object-fit: contain;
            display: block;
            transition: opacity 0.3s ease;
        }

        /* Niebieskie narożniki wysunięte lekko na zewnątrz */
        .corner {
            position: absolute;
            width: 35px;
            height: 35px;
            border: 4px solid var(--primary-blue);
            pointer-events: none;
            z-index: 10;
        }

        .top-left {
            top: -10px;
            left: -10px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 12px;
        }

        .top-right {
            top: -10px;
            right: -10px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: 12px;
        }

        .bottom-left {
            bottom: -10px;
            left: -10px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: 12px;
        }

        .bottom-right {
            bottom: -10px;
            right: -10px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 12px;
        }

        /* Sekcja licznika */
        .timer-section {
            width: 100%;
            max-width: 300px;
            text-align: center;
        }

        .timer-text {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .timer-countdown {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Pasek Postępu */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #1c1c1e;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 100%;
            background-color: var(--primary-blue);
            border-radius: 3px;
            transition: width 1s linear;
        }

        /* Ekran Sukcesu Weryfikacji */
        .success-card {
            background-color: #1c1c1e;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            border: 1px solid rgba(48, 209, 88, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: rgba(48, 209, 88, 0.1);
            border: 3px solid var(--success-green);
            color: var(--success-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px auto;
            font-weight: bold;
        }

        .success-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .success-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Dolna nawigacja */
        .bottom-nav {
            background-color: var(--bg-dark);
            border-top: 1px solid #1c1c1e;
            padding: 12px 20px 25px 20px;
            display: flex;
            justify-content: space-around;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        .nav-item {
            opacity: 0.6;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary-blue);
            opacity: 1;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="back-btn" onclick="resetApp()">&lt; Kod QR</div>
        <div class="header-title" id="page-title">Mój kod QR</div>
        <div style="width: 50px;"></div>
    </header>

    <main id="qr-screen" class="screen">
        <div class="qr-container" onclick="simulateVerification()">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            
            <img src="obraz.png" alt="Kod QR" class="qr-image-src" id="qr-image">
        </div>

        <div class="timer-section" id="timer-box">
            <p class="timer-text">Kod wygaśnie za:</p>
            <div class="timer-countdown" id="countdown">03:00</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </main>

    <main id="success-screen" class="screen hidden">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h2 class="success-title">Zweryfikowano pomyślnie</h2>
            <p class="success-desc">Tożsamość i ważność dokumentu zostały potwierdzone w systemie centralnym.</p>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item">
            <div class="nav-icon">📇</div>
            <div>Dokumenty</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">🔳</div>
            <div>Kod QR</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">⚙️</div>
            <div>Więcej</div>
        </div>
    </nav>

    <script>
        const TOTAL_TIME = 180; // 3 minuty
        let timeLeft = TOTAL_TIME;
        let timerInterval;

        function startTimer() {
            const countdownEl = document.getElementById('countdown');
            const progressFillEl = document.getElementById('progress-fill');
            const qrImage = document.getElementById('qr-image');

            timerInterval = setInterval(() => {
                timeLeft--;

                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                seconds = seconds < 10 ? '0' + seconds : seconds;

                countdownEl.innerText = `${minutes}:${seconds}`;

                let percentage = (timeLeft / TOTAL_TIME) * 100;
                progressFillEl.style.width = `${percentage}%`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    countdownEl.innerText = "WYGASŁ";
                    countdownEl.style.color = "#ef4444";
                    progressFillEl.style.backgroundColor = "#ef4444";
                    qrImage.style.opacity = "0.1";
                    document.querySelector('.qr-container').style.pointerEvents = "none";
                }
            }, 1000);
        }

        function simulateVerification() {
            clearInterval(timerInterval);
            document.getElementById('qr-screen').classList.add('hidden');
            document.getElementById('success-screen').classList.remove('hidden');
            document.getElementById('page-title').innerText = 'Status weryfikacji';
        }

        function resetApp() {
            clearInterval(timerInterval);
            timeLeft = TOTAL_TIME;
            document.getElementById('countdown').innerText = "03:00";
            document.getElementById('countdown').style.color = "var(--primary-blue)";
            document.getElementById('progress-fill').style.width = "100%";
            document.getElementById('progress-fill').style.backgroundColor = "var(--primary-blue)";
            document.getElementById('qr-image').style.opacity = "1";
            document.querySelector('.qr-container').style.pointerEvents = "auto";
            
            document.getElementById('success-screen').classList.add('hidden');
            document.getElementById('qr-screen').classList.remove('hidden');
            document.getElementById('page-title').innerText = 'Mój kod QR';
            startTimer();
        }

        window.onload = startTimer;
    </script>
</body>
</html>
